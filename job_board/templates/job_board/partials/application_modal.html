
<div class="apply-overlay" id="applyModal">
    <div class="apply-box">
        <h3>{{ job.title }}</h3>
        <form method="POST" action=''>
            {% csrf_token %}
            {{ apply_form }}
            <div class="form-actions">
                <button type="submit">Submit</button>
                <button type="button" class="btn-cancel" onclick="closeApply()">← Cancel</button>
            </div>
        </form>
    </div>
</div>
