{% load static %}

<link rel="stylesheet" href="{% static 'css/report.css' %}">

<div class="report-overlay">
    <div class="report-box">

        <h3>Report</h3>

        <form method="POST">
            {% csrf_token %}
            {{ form }}

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit">Submit</button>
        </form>

    </div>
</div>
