<h2>Inbox</h2>

{% for item in convo_data %}
    <div>
        <a href="{% url 'conversation_details' item.conversation.id %}">
            {{ item.conversation.job }}
        </a>

        {% if item.has_unread %}
            <strong>New Message</strong>
        {% endif %}
    </div>
{% endfor %}

<p><a href="/">Return to home page</a></p>
