

<form method="GET" action="{% url 'job_page' %}">
    <!-- Search -->
    <input type="text" name="q" placeholder="Search jobs..." value="{{ request.GET.q }}">

    <!-- Category -->
    <select name="category">
        <option value="">All</option>
        <option value="landscaping" {% if request.GET.category == "landscaping" %}selected{% endif %}>Landscaping</option>
        <option value="cleaning" {% if request.GET.category == "cleaning" %}selected{% endif %}>Cleaning</option>
        <option value="garbage_removal" {% if request.GET.category == "garbage_removal" %}selected{% endif %}>Garbage Removal</option>
        <option value="automotive" {% if request.GET.category == "automotive" %}selected{% endif %}>Automotive</option>
        <option value="handyman" {% if request.GET.category == "handyman" %}selected{% endif %}>Handyman</option>
    </select>
    <button type="submit">Search</button>
</form>
