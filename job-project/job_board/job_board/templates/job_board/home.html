{% extends 'job_board/base.html' %}
{% load static %}
{% block extra_css %}
<link rel="stylesheet" href="{% static 'css/home.css' %}">
<link rel="stylesheet" href="{% static 'css/search_bar.css' %}">
{% endblock %}
{% block content%} 
<div class='home-container'>
    <div class='search-wrapper'>
        {% include 'job_board/partials/search_bar.html' %}
    </div>
    <div class="logo">
        <img src="{% static 'app/logo.png' %}" alt="Hustlr Logo">
    </div>
    <div class='get-started'>
        <p>Create an account or log in to see quick jobs near you.
        <a class='button' href="{% url 'login' %}">Get Started →</a>
    </div>
</div>
{% endblock %}
